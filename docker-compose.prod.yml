version: '3.9'
# Production: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  nginx:
    image: nginx:1.25-alpine
    container_name: airecruit_nginx
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
    volumes:
      - /home/dev/airecruit/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  backend:
    ports: []
    environment:
      - NEXT_PUBLIC_API_URL=https://ats.aviinjobs.com/api
    deploy:
      resources:
        limits:
          memory: 1g
    restart: unless-stopped

  frontend:
    ports: []
    environment:
      - NEXT_PUBLIC_API_URL=https://ats.aviinjobs.com/api
    deploy:
      resources:
        limits:
          memory: 512m
    restart: unless-stopped

  db:
    deploy:
      resources:
        limits:
          memory: 2g
    restart: unless-stopped

  embed:
    ports: []
    deploy:
      resources:
        limits:
          memory: 512m
    restart: unless-stopped

  ollama:
    ports: []
    restart: unless-stopped
